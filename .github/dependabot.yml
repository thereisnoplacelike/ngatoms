version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: rc
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "ts-*"
          - "@typescript-eslint/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
      changesets:
        patterns:
          - "@changesets/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: rc
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"