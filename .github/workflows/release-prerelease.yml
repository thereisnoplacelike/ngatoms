name: Release Prerelease

on:
  push:
    branches:
      - alpha
      - beta
      - rc

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prerelease:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect channel
        id: channel
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" != "alpha" && "$BRANCH" != "beta" && "$BRANCH" != "rc" ]]; then
            echo "Unsupported prerelease branch: $BRANCH"
            exit 1
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Enter prerelease mode
        run: npx changeset pre enter ${{ steps.channel.outputs.name }}

      - name: Version packages
        run: npm run version:packages

      - name: Build
        run: npm run build --if-present

      - name: Publish prerelease packages
        run: npm run publish:changesets

      - name: Exit prerelease mode
        if: always()
        run: npx changeset pre exit