name: Release

on:
  pull_request:
    branches:
      - main
      - lts
      - rc
  push:
    branches:
      - main
      - lts
      - rc

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  release-stable:
    name: Stable Release
    needs: ci
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Version packages
        run: npm run version:packages

      - name: Build packages
        run: npm run build --if-present

      - name: Publish packages
        run: npm run publish:changesets
        env:
          NPM_CONFIG_PROVENANCE: true

  release-lts:
    name: LTS Release
    needs: ci
    if: github.event_name == 'push' && github.ref_name == 'lts'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Enter LTS mode
        run: npm run pre:enter:lts

      - name: Version packages
        run: npm run version:packages

      - name: Build packages
        run: npm run build --if-present

      - name: Publish LTS packages
        run: npm run publish:changesets
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Exit LTS mode
        if: always()
        run: npm run pre:exit

  release-rc:
    name: RC Release
    needs: ci
    if: github.event_name == 'push' && github.ref_name == 'rc'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Enter prerelease mode
        run: npm run pre:enter:rc

      - name: Version packages
        run: npm run version:packages

      - name: Build packages
        run: npm run build --if-present

      - name: Publish RC packages
        run: npm run publish:changesets
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Exit prerelease mode
        if: always()
        run: npm run pre:exit
