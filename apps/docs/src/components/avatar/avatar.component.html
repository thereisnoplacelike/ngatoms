@if (src() && !imgError()) {
  <img
    class="nga-avatar__img"
    [src]="src()"
    [alt]="alt()"
    (error)="onError()"
  />
} @else if (fallback()) {
  <span class="nga-avatar__fallback">{{ fallback() }}</span>
} @else {
  <svg class="nga-avatar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>
}
