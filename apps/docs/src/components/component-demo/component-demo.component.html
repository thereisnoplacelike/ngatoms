<nga-tabs defaultValue="preview" variant="underline" class="demo-tabs">
  <div ngAtomsTabList>
    <button ngAtomsTabTrigger value="preview">Preview</button>
    <button ngAtomsTabTrigger value="code">Code</button>
  </div>

  <div ngAtomsTabPanel value="preview" class="demo-preview">
    <ng-content />
  </div>

  <div ngAtomsTabPanel value="code" class="demo-code">
    @if (files().length === 1) {
      <app-code-block [code]="files()[0].code" [language]="files()[0].language" />
    } @else {
      <nga-tabs [defaultValue]="files()[0]?.name" variant="pills" class="code-file-tabs">
        <div ngAtomsTabList>
          @for (file of files(); track file.name) {
            <button ngAtomsTabTrigger [value]="file.name">{{ file.name }}</button>
          }
        </div>
        @for (file of files(); track file.name) {
          <div ngAtomsTabPanel [value]="file.name">
            <app-code-block [code]="file.code" [language]="file.language" />
          </div>
        }
      </nga-tabs>
    }
  </div>
</nga-tabs>
